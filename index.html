<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แบบสอบถามสหกิจศึกษา 2568</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #1a3c6e;
      --primary-light: #e8f0fb;
      --accent: #2563eb;
      --success: #16a34a;
      --border: #e2e8f0;
      --text: #0f172a;
      --text-muted: #64748b;
      --bg: #f8fafc;
      --card: #ffffff;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'IBM Plex Sans Thai', 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.7;
    }

    .top-bar {
      background: var(--primary);
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.15);
    }

    .top-bar-title {
      font-size: 14px;
      font-weight: 500;
      opacity: 0.9;
    }

    .top-bar-step {
      font-size: 13px;
      opacity: 0.7;
    }

    .progress-outer {
      height: 3px;
      background: rgba(255, 255, 255, 0.2);
    }

    .progress-inner {
      height: 3px;
      background: #60a5fa;
      transition: width .4s ease;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 28px 16px 80px;
    }

    .step-header {
      margin-bottom: 24px;
    }

    .step-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 3px 10px;
      background: var(--primary-light);
      color: var(--primary);
      border-radius: 20px;
      margin-bottom: 8px;
    }

    .step-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .step-sub {
      font-size: 12px;
      color: var(--text-muted);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      transition: border-color .2s;
    }

    .card:focus-within {
      border-color: var(--accent);
    }

    .q-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.6;
    }

    .q-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    .required {
      color: #dc2626;
      margin-left: 2px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }

    .opt {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all .15s;
      user-select: none;
    }

    .opt:hover {
      background: var(--primary-light);
      border-color: #93c5fd;
    }

    .opt.selected {
      background: var(--primary-light);
      border-color: var(--accent);
      color: var(--primary);
    }

    .opt input {
      accent-color: var(--accent);
      flex-shrink: 0;
    }

    .scale-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .scale-btn {
      flex: 1;
      padding: 10px 4px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: all .15s;
      color: var(--text-muted);
    }

    .scale-btn:hover {
      background: var(--primary-light);
      border-color: #93c5fd;
    }

    .scale-btn.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .scale-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    input[type=text],
    textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      margin-top: 8px;
      outline: none;
      transition: border-color .15s;
    }

    input[type=text]:focus,
    textarea:focus {
      border-color: var(--accent);
    }

    textarea {
      min-height: 90px;
      resize: vertical;
      line-height: 1.6;
    }

    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--card);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      z-index: 50;
    }

    .btn {
      padding: 10px 24px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      transition: all .15s;
    }

    .btn:hover {
      background: var(--bg);
    }

    .btn:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .dots {
      display: flex;
      gap: 5px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border);
      transition: all .2s;
    }

    .dot.done {
      background: #93c5fd;
    }

    .dot.active {
      background: var(--accent);
      transform: scale(1.3);
    }

    .success-wrap {
      text-align: center;
      padding: 60px 24px;
    }

    .success-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #dcfce7;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
    }

    .success-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--success);
      margin-bottom: 8px;
    }

    .success-sub {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    .error-msg {
      font-size: 12px;
      color: #dc2626;
      margin-top: 4px;
      display: none;
    }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .sending .spinner {
      display: inline-block;
    }

    .sending .btn-text {
      display: none;
    }
  </style>
</head>

      },
      {
        badge: 'ส่วนที่ 7 / 7', title: 'คำแนะนำและข้อเสนอแนะ',
        sub: 'CLO 4, 5  ·  PLO4–6  ·  AUN-QA C3, C4, C6',
        questions: [
          { id: 'recommend', type: 'scale', label: '32. ท่านจะแนะนำบริษัทนี้ให้รุ่นน้องมาฝึกสหกิจหรือไม่', required: true, lo: 'ไม่แนะนำเลย', hi: 'แนะนำมาก' },
          { id: 'advice_junior', type: 'textarea', label: '33. คำแนะนำสำหรับรุ่นน้องในการเตรียมตัว', required: true, hint: 'ด้านทักษะ / ทัศนคติ / การสัมภาษณ์' },
          { id: 'advice_curriculum', type: 'textarea', label: '34. คำแนะนำต่อหลักสูตร', required: true, hint: 'วิชาที่ควรเพิ่ม / ปรับปรุง / ตัดออก' },
          { id: 'other_feedback', type: 'textarea', label: '35. ข้อเสนอแนะอื่นๆ', hint: 'ต่อมหาวิทยาลัย / บริษัท / กระบวนการสหกิจ' },
        ]
      }
    ];

    let cur = 0;
    const ans = {};

    function renderDots() {
      const d = document.getElementById('dots');
      d.innerHTML = steps.map((_, i) =>
        `<div class="dot ${i < cur ? 'done' : i === cur ? 'active' : ''}"></div>`
      ).join('');
    }

    function renderProgress() {
      const pct = Math.round(((cur + 1) / steps.length) * 100);
      document.getElementById('prog-bar').style.width = pct + '%';
      document.getElementById('top-step').textContent = `${cur + 1} / ${steps.length}`;
      renderDots();
      document.getElementById('btn-prev').disabled = cur === 0;
      const isLast = cur === steps.length - 1;
      document.getElementById('btn-next').querySelector('.btn-text').textContent = isLast ? 'ส่งแบบสอบถาม ✓' : 'ถัดไป →';
    }

    function renderStep() {
      const s = steps[cur];
      let html = `<div class="step-header">
    <span class="step-badge">${s.badge}</span>
    <div class="step-title">${s.title}</div>
    <div class="step-sub">${s.sub}</div>
  </div>`;

      s.questions.forEach(q => {
        html += `<div class="card">
      <div class="q-label">${q.label}${q.required ? '<span class="required">*</span>' : ''}</div>`;
        if (q.hint) html += `<div class="q-hint">${q.hint}</div>`;
        const v = ans[q.id];

        if (q.type === 'text') {
          html += `<input type="text" value="${v || ''}" oninput="ans['${q.id}']=this.value" placeholder="พิมพ์คำตอบที่นี่...">`;
        } else if (q.type === 'textarea') {
          html += `<textarea oninput="ans['${q.id}']=this.value" placeholder="พิมพ์คำตอบที่นี่...">${v || ''}</textarea>`;
        } else if (q.type === 'radio') {
          html += `<div class="options">` + q.opts.map(o =>
            `<label class="opt${v === o ? ' selected' : ''}" onclick="setRadio('${q.id}','${o}',this)">
          <input type="radio" name="${q.id}" ${v === o ? 'checked' : ''}> ${o}
        </label>`).join('') + `</div>`;
        } else if (q.type === 'checkbox') {
          const vals = v || [];
          html += `<div class="options">` + q.opts.map(o =>
            `<label class="opt${vals.includes(o) ? ' selected' : ''}" onclick="toggleCb('${q.id}','${o}',this)">
          <input type="checkbox" ${vals.includes(o) ? 'checked' : ''}> ${o}
        </label>`).join('') + `</div>`;
        } else if (q.type === 'scale') {
          html += `<div class="scale-row">` + [1, 2, 3, 4, 5].map(n =>
            `<button class="scale-btn${v == n ? ' selected' : ''}" onclick="setScale('${q.id}',${n},this)">${n}</button>`
          ).join('') + `</div>
      <div class="scale-labels"><span>${q.lo}</span><span>${q.hi}</span></div>`;
        }
        html += `</div>`;
      });

      document.getElementById('form-area').innerHTML = html;
      renderProgress();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function setRadio(id, val, el) {
      ans[id] = val;
      el.closest('.options').querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
    }
    function toggleCb(id, val, el) {
      if (!ans[id]) ans[id] = [];
      const i = ans[id].indexOf(val);
      if (i >= 0) { ans[id].splice(i, 1); el.classList.remove('selected'); }
      else { ans[id].push(val); el.classList.add('selected'); }
    }
    function setScale(id, val, el) {
      ans[id] = val;
      el.closest('.scale-row').querySelectorAll('.scale-btn').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
    }

    function validate() {
      const s = steps[cur];
      for (const q of s.questions) {
        if (!q.required) continue;
        const v = ans[q.id];
        if (!v || (Array.isArray(v) && v.length === 0) || v === '') return false;
      }
      return true;
    }

    async function submitForm() {
      const btn = document.getElementById('btn-next');
      btn.classList.add('sending');
      btn.disabled = true;
      try {
        const payload = { ...ans, submitted_at: new Date().toISOString() };
        await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(payload),
        });
        document.getElementById('form-area').innerHTML = `
      <div class="success-wrap">
        <div class="success-icon">✓</div>
        <div class="success-title">ขอบคุณที่ตอบแบบสอบถาม!</div>
        <div class="success-sub">ข้อมูลของท่านถูกบันทึกเรียบร้อยแล้ว<br>ข้อมูลจะถูกนำไปใช้พัฒนาหลักสูตรและประกอบการทำ SAR / AUN-QA</div>
      </div>`;
        document.querySelector('.nav').style.display = 'none';
        document.getElementById('prog-bar').style.width = '100%';
      } catch (e) {
        alert('เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง');
        btn.classList.remove('sending');
        btn.disabled = false;
      }
    }

    function next() {
      if (!validate()) {
        alert('กรุณาตอบคำถามที่มีเครื่องหมาย * ให้ครบก่อนครับ');
        return;
      }
      if (cur === steps.length - 1) { submitForm(); return; }
      cur++;
      renderStep();
    }
    function prev() {
      if (cur > 0) { cur--; renderStep(); }
    }

    renderStep();
  </script>
</body>

</html>
